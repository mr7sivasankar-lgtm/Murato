name: myillo_app
description: "Myillo - Construction Marketplace native Android app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # ── Networking ──────────────────────────────────────────
  http: ^1.2.1

  # ── Secure Token Storage ─────────────────────────────────
  flutter_secure_storage: ^9.2.2

  # ── State Management ─────────────────────────────────────
  provider: ^6.1.2

  # ── Navigation ────────────────────────────────────────────
  go_router: ^14.6.1

  # ── Fonts ─────────────────────────────────────────────────
  google_fonts: ^6.2.1

  # ── Images ────────────────────────────────────────────────
  cached_network_image: ^3.4.1
  image_picker: ^1.1.2

  # ── Location (GPS) ────────────────────────────────────────
  geolocator: ^13.0.2
  geocoding: ^3.0.0

  # ── Real-time Chat ─────────────────────────────────────────
  socket_io_client: ^2.0.3+1

  # ── Firebase (FCM push notifications) ─────────────────────
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # ── Utilities ─────────────────────────────────────────────
  intl: ^0.19.0
  url_launcher: ^6.3.0
  share_plus: ^10.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
